<!DOCTYPE html>
<html>
<head>
  <title>Sophia Bostas 💩</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      font-size: 50px;
      color: brown;
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0% {opacity: 1;}
      50% {opacity: 0.3;}
      100% {opacity: 1;}
    }

    .coco {
      position: fixed;
      top: -50px;
      font-size: 30px;
      animation: cair linear infinite;
    }

    @keyframes cair {
      to { transform: translateY(110vh); }
    }

    button {
      padding: 12px;
      font-size: 16px;
      margin: 5px;
      background: brown;
      color: white;
      border: none;
      border-radius: 10px;
    }

    img {
      width: 120px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>💩 SOPHIA BOSTAS 💩</h1>
<p>O site MAIS FEDIDO DO MUNDO 😈</p>

<h2>🔥 Nível de fedo: <span id="nivel">0</span></h2>

<button onclick="ganharPonto()">Aumentar fedo 💩</button>
<button onclick="troll()">Botão misterioso ☠️</button>

<h2>🎮 Gincana da Bosta</h2>
<p>Clique nos cocôs que caem!</p>

<h2>📸 Galeria</h2>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Emoji_u1f4a9.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Emoji_u1f4a9.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Emoji_u1f4a9.svg">

<audio id="peido">
  <source src="https://www.soundjay.com/human/fart-01.mp3">
</audio>

<audio id="trollsom">
  <source src="https://www.soundjay.com/button/beep-07.mp3">
</audio>

<script>
let pontos = 0;

function ganharPonto() {
  pontos++;
  document.getElementById("nivel").innerText = pontos;
  document.getElementById("peido").play();
}

function troll() {
  document.getElementById("trollsom").play();
  alert("💀 VOCÊ FOI TROLADO 💀");
}

function criarCoco() {
  const coco = document.createElement("div");
  coco.classList.add("coco");
  coco.innerHTML = "💩";

  coco.style.left = Math.random() * 100 + "vw";
  coco.style.animationDuration = (Math.random() * 3 + 2) + "s";

  coco.onclick = () => {
    pontos++;
    document.getElementById("nivel").innerText = pontos;
    coco.remove();
    document.getElementById("peido").play();
  };

  document.body.appendChild(coco);

  setTimeout(() => coco.remove(), 5000);
}

setInterval(criarCoco, 400);
</script>

</body>
</html>
